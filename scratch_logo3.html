<!DOCTYPE html>
<html>
<head>
    <title>Logo Test 3</title>
    <style>
        body { background: #fcfade; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .logo-container { width: 300px; height: 300px; border: 1px solid #ccc; background: white; margin-bottom: 20px;}
    </style>
</head>
<body>
    <div class="logo-container">
        <svg viewBox="0 0 120 120" width="300" height="300" xmlns="http://www.w3.org/2000/svg">
            <g transform="translate(60, 60)">
                <text x="0" y="12" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="34" font-style="italic" fill="#00e600" text-anchor="middle" letter-spacing="-1">JMS</text>
                
                <g>
                    <!-- Perfected Orange Swoosh -->
                    <path d="M -55,-15 C -40,-70 35,-65 55,-30 C 25,-48 -25,-45 -55,-15 Z" fill="#ff7f00"/>
                    <!-- Perfected Green Swoosh -->
                    <path d="M -5,-53 C 20,-60 40,-50 55,-30 C 30,-45 0,-45 -5,-53 Z" fill="#00e600"/>
                </g>

                <g transform="rotate(180)">
                    <path d="M -55,-15 C -40,-70 35,-65 55,-30 C 25,-48 -25,-45 -55,-15 Z" fill="#ff7f00"/>
                    <path d="M -5,-53 C 20,-60 40,-50 55,-30 C 30,-45 0,-45 -5,-53 Z" fill="#00e600"/>
                </g>
            </g>
        </svg>
    </div>
</body>
</html>
