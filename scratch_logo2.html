<!DOCTYPE html>
<html>
<head>
    <title>Logo Test 2</title>
    <style>
        body { background: #fcfade; display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; align-items: center; padding: 20px; margin: 0; }
        .logo-container { width: 200px; height: 200px; border: 1px solid #ccc; background: white; text-align: center; }
        .label { font-family: sans-serif; font-size: 12px; margin-top: 5px; }
    </style>
</head>
<body>
    <!-- Design 1: Smooth Crescent -->
    <div class="logo-container">
        <svg viewBox="0 0 120 120" width="200" height="200" xmlns="http://www.w3.org/2000/svg">
            <g transform="translate(60, 60)">
                <text x="0" y="12" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="34" font-style="italic" fill="#00e600" text-anchor="middle" letter-spacing="-1">JMS</text>
                <g>
                    <path d="M -50,-10 C -40,-60 40,-60 55,-25 C 30,-45 -20,-45 -50,-10 Z" fill="#ff7f00"/>
                    <path d="M 0,-50 C 25,-55 45,-40 55,-25 C 35,-38 15,-43 0,-50 Z" fill="#00e600"/>
                </g>
                <g transform="rotate(180)">
                    <path d="M -50,-10 C -40,-60 40,-60 55,-25 C 30,-45 -20,-45 -50,-10 Z" fill="#ff7f00"/>
                    <path d="M 0,-50 C 25,-55 45,-40 55,-25 C 35,-38 15,-43 0,-50 Z" fill="#00e600"/>
                </g>
            </g>
        </svg>
        <div class="label">1. Smooth Crescent</div>
    </div>

    <!-- Design 2: Thick Left, Thin Right -->
    <div class="logo-container">
        <svg viewBox="0 0 120 120" width="200" height="200" xmlns="http://www.w3.org/2000/svg">
            <g transform="translate(60, 60)">
                <text x="0" y="12" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="34" font-style="italic" fill="#00e600" text-anchor="middle" letter-spacing="-1">JMS</text>
                <g>
                    <!-- Rounded left edge -->
                    <path d="M -50,-15 A 6,6 0 0,1 -42,-25 C -25,-60 30,-60 55,-25 C 20,-45 -25,-40 -45,-12 A 6,6 0 0,1 -50,-15 Z" fill="#ff7f00"/>
                    <path d="M -10,-48 C 20,-55 40,-45 55,-25 C 30,-40 0,-43 -10,-48 Z" fill="#00e600"/>
                </g>
                <g transform="rotate(180)">
                    <path d="M -50,-15 A 6,6 0 0,1 -42,-25 C -25,-60 30,-60 55,-25 C 20,-45 -25,-40 -45,-12 A 6,6 0 0,1 -50,-15 Z" fill="#ff7f00"/>
                    <path d="M -10,-48 C 20,-55 40,-45 55,-25 C 30,-40 0,-43 -10,-48 Z" fill="#00e600"/>
                </g>
            </g>
        </svg>
        <div class="label">2. Thick Left (Rounded)</div>
    </div>

    <!-- Design 3: Asymmetrical Dynamic Swoosh -->
    <div class="logo-container">
        <svg viewBox="0 0 120 120" width="200" height="200" xmlns="http://www.w3.org/2000/svg">
            <g transform="translate(60, 60)">
                <text x="0" y="12" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="34" font-style="italic" fill="#00e600" text-anchor="middle" letter-spacing="-1">JMS</text>
                <g>
                    <path d="M -52,-14 C -58,-30 -20,-65 30,-50 C 45,-45 55,-35 55,-28 C 40,-45 10,-50 -20,-40 C -35,-35 -48,-25 -52,-14 Z" fill="#ff7f00"/>
                    <path d="M 10,-48 C 30,-45 45,-38 55,-28 C 40,-40 20,-42 10,-48 Z" fill="#00e600"/>
                </g>
                <g transform="rotate(180)">
                    <path d="M -52,-14 C -58,-30 -20,-65 30,-50 C 45,-45 55,-35 55,-28 C 40,-45 10,-50 -20,-40 C -35,-35 -48,-25 -52,-14 Z" fill="#ff7f00"/>
                    <path d="M 10,-48 C 30,-45 45,-38 55,-28 C 40,-40 20,-42 10,-48 Z" fill="#00e600"/>
                </g>
            </g>
        </svg>
        <div class="label">3. Dynamic Swoosh</div>
    </div>

    <!-- Design 4: Closer to original but perfectly smooth -->
    <div class="logo-container">
        <svg viewBox="0 0 120 120" width="200" height="200" xmlns="http://www.w3.org/2000/svg">
            <g transform="translate(60, 60)">
                <text x="0" y="12" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="34" font-style="italic" fill="#00e600" text-anchor="middle" letter-spacing="-1">JMS</text>
                <g>
                    <path d="M -50,-15 C -55,-35 -25,-65 30,-55 C 45,-50 55,-35 55,-30 C 35,-48 0,-50 -35,-35 C -45,-30 -48,-25 -50,-15 Z" fill="#ff7f00"/>
                    <path d="M -10,-48 C 15,-52 40,-45 55,-30 C 35,-42 10,-45 -10,-48 Z" fill="#00e600"/>
                </g>
                <g transform="rotate(180)">
                    <path d="M -50,-15 C -55,-35 -25,-65 30,-55 C 45,-50 55,-35 55,-30 C 35,-48 0,-50 -35,-35 C -45,-30 -48,-25 -50,-15 Z" fill="#ff7f00"/>
                    <path d="M -10,-48 C 15,-52 40,-45 55,-30 C 35,-42 10,-45 -10,-48 Z" fill="#00e600"/>
                </g>
            </g>
        </svg>
        <div class="label">4. Original Style Refined</div>
    </div>
</body>
</html>
